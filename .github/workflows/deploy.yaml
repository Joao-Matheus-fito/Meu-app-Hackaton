name: Deploy to shinyapps.io

on:
  push:
    branches: [ main, master ]

jobs:
  shiny-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar o R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'

      - name: Configurar o rsconnect e dependências
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rsconnect
            any::shiny
            any::commonmark
            any::curl
            any::duckdb@1.2.1
            any::duckspatial
            any::httr2
            any::DT
            any::geobr
            any::leaflet
            any::nasapower
            any::sidrar
            any::tidyverse
            any::cpp11
            any::geometries
            any::progress

      - name: Autorizar e Fazer o Deploy
        run: |
          Rscript -e "rsconnect::setAccountInfo(name='${{ secrets.SHINYAPPS_NAME }}', token='${{ secrets.SHINYAPPS_TOKEN }}', secret='${{ secrets.SHINYAPPS_SECRET }}')"
          Rscript -e "rsconnect::deployApp(appDir = '.', appFiles = c('app.R', 'www/fotocapa.png'), appName = 'ferrugem_soja_app', forceUpdate = TRUE, wait = FALSE)"
